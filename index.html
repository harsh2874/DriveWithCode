<!doctype html>
<html lang="en">
  <head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Car animation game</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="container">

            <img src="hyundai_creta-right_tyre_crop.png" alt="right wheel" />
          </div>
        </div>
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
